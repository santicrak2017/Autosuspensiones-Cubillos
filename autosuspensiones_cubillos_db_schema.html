
<style>
#erd { padding: 8px 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f1efe8',
    primaryBorderColor: dark ? '#5f5e5a' : '#b4b2a9',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  MECANICOS {
    uuid id PK
    string nombre
    string telefono
    string especialidad
    boolean activo
    timestamp creado_en
  }
  VEHICULOS {
    uuid id PK
    string placa UK
    string marca
    string modelo
    int anio
    uuid propietario_id FK
    timestamp creado_en
  }
  PROPIETARIOS {
    uuid id PK
    string nombre
    string telefono
    string email
    timestamp creado_en
  }
  TRABAJOS {
    uuid id PK
    uuid vehiculo_id FK
    uuid mecanico_id FK
    string descripcion
    decimal costo
    enum estado
    date fecha_inicio
    date fecha_fin
    timestamp creado_en
  }
  HERRAMIENTAS {
    uuid id PK
    string nombre
    string descripcion
    boolean en_uso
    uuid mecanico_id FK
    timestamp actualizado_en
  }
  REPUESTOS {
    uuid id PK
    string nombre
    string referencia UK
    int stock_actual
    int stock_minimo
    decimal precio_unitario
    timestamp actualizado_en
  }
  REPUESTOS_TRABAJO {
    uuid id PK
    uuid trabajo_id FK
    uuid repuesto_id FK
    int cantidad
    decimal precio_usado
  }
  GASTOS {
    uuid id PK
    enum tipo
    string descripcion
    decimal monto
    uuid repuesto_id FK
    uuid herramienta_id FK
    date fecha
    timestamp creado_en
  }
  PAGOS {
    uuid id PK
    uuid trabajo_id FK
    uuid propietario_id FK
    decimal monto
    enum metodo
    date fecha
    string notas
  }

  PROPIETARIOS ||--o{ VEHICULOS : "posee"
  VEHICULOS ||--o{ TRABAJOS : "tiene"
  MECANICOS ||--o{ TRABAJOS : "realiza"
  MECANICOS ||--o{ HERRAMIENTAS : "usa"
  TRABAJOS ||--o{ REPUESTOS_TRABAJO : "consume"
  REPUESTOS ||--o{ REPUESTOS_TRABAJO : "incluido en"
  TRABAJOS ||--o{ PAGOS : "genera"
  PROPIETARIOS ||--o{ PAGOS : "realiza"
  REPUESTOS ||--o{ GASTOS : "compra"
  HERRAMIENTAS ||--o{ GASTOS : "compra"
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
